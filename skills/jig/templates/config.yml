# .jig/config.yml — Jig configuration for this repo.
project:
  build: "echo 'set project.build in .jig/config.yml'"
  test:  "echo 'set project.test in .jig/config.yml'"
  lint:  "echo 'set project.lint in .jig/config.yml'"
gates:
  spec_plan: hard        # hard | soft | off
  review:    hard        # hard | soft | off
trust_level: normal      # strict | normal | trusted
tracks:
  default_by_type:       # auto-suggested track per task type (overridable at Intake)
    feature:  full
    refactor: full
    bug:      fast
    chore:    fast
    # 'hotfix' track is selected explicitly for urgent work
loops:
  max_test: 3
  max_review: 2
memory:
  graph:   auto          # auto | on | off (use a code-graph MCP if present)
  refresh: on_ship       # on_ship | manual
review:
  dimensions: [correctness, security, tests, conventions]
  verify: adversarial     # spawn verifiers to refute findings
ship:
  mode: commit            # commit | pr  (open a PR with gh, or leave commits for the dev)
git:
  track_state: true        # commit .jig/ state alongside code (chosen at init); false = gitignore it, local-only
  branch:  true           # create a feature branch <type>/<slug> at Implement; false = current branch
  base:    auto           # auto = detect origin/HEAD; prefer an explicit "main" / "dev" for a stable default
  branch_from: remote     # remote = fetch & branch off <remote>/<base> (latest upstream); local = local <base> ref
  push:    true           # push the branch during Ship
  cleanup: on_merge       # on_merge = /jig cleanup deletes after a verified merge; off = never
  delete_remote: true     # on cleanup, also delete the remote branch
