name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          # strip leading/trailing blank lines
          sed -i -e '/./,$!d' release-notes.md
          if [ -s release-notes.md ]; then
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          else
            echo "No CHANGELOG.md section for $version; using generated notes." >&2
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.notes.outputs.fallback }}" = "true" ]; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md --verify-tag
          fi
